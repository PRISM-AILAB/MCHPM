seed: 42

data:
  fname: sample_Musical_Instruments

  # Train / Test split ratio (val is carved from train in main.py at load time).
  test_size: 0.2

args:
  device: cuda

  # Training
  batch_size: 128
  num_epochs: 100
  optimizer: adam
  lr: 0.001
  dropout: 0.1
  patience: 5
  val_ratio: 0.125          # fraction of train carved into val (0.125 of 80% = 10% of full)

  # Model architecture
  feature_dimension: 256
  num_heads: 4
  dff: 2048
