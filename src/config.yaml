seed: 42 

data:
  # Base filename for the dataset (located in data/raw/)
  # Example: if file is 'data/raw/dataSample.jsonl.gz', set fname: dataSample
  fname: All_Beauty        
  
  # The column name representing the label (e.g., helpful_vote, vote, etc.)
  label_col: helpful_vote  

  # Train/Val/Test split ratios
  test_size: 0.2   # Use 20% of data for testing
  val_size: 0.1    # Use 10% of data for validation

args:
  device: cuda        # 'cuda' or 'cpu'
  batch_size: 128     # Batch size
  num_epochs: 100     # Maximum training epochs
  optimizer: adam     # Optimizer type: adam / adamw / sgd / rmsprop
  lr: 0.001           # Learning rate
  dropout: 0.1        # Dropout rate
  patience: 5         # EarlyStopping patience (stop if no improvement after 5 epochs)